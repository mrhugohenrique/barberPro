<div class="w-full min-h-screen flex flex-col justify-center items-center px-4">
	<img src="../../../assets/logo.png" alt="Logo BarberPRO" class="mb-10" />

	@if (!isRegister()) {
		<form
			(ngSubmit)="onSubmit()"
			class="w-full flex flex-col gap-3 max-w-[31.25em]"
		>
			<input
				class="w-full rounded h-11 px-4 text-black bg-primary-100 placeholder-gray-500 border border-gray-300 focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition"
				id="email-address"
				name="email"
				type="email"
				autocomplete="email"
				placeholder="Digite seu email..."
				[formControl]="_formGroup.controls.email"
			/>
			<input
				class="w-full rounded h-11 px-4 text-black bg-primary-100 placeholder-gray-500 border border-gray-300 focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition"
				[formControl]="_formGroup.controls.password"
				id="login-password"
				name="password"
				type="password"
				autocomplete="current-password"
				placeholder="************"
			/>
			<button type="submit" class="w-full rounded h-11 bg-secondary hover:bg-hoverOrange font-bold text-slate-900 transition duration-150">
				Acessar
			</button>
			<div class="text-sm text-center">
				<button
					type="button"
					(click)="register()"
					class="w-full rounded h-11 font-medium text-secondary hover:text-hoverOrange transition duration-150"
				>
					Registrar-se
				</button>
			</div>
		</form>
	} @else {
		<!-- Formulário de Registro -->
		<form (ngSubmit)="onSubmitRegister()" class="w-full flex flex-col gap-3 max-w-[31.25em] bg-gray-300 p-5 rounded-md shadow-md">
			<app-input
				id="name-user"
				label="Nome"
				placeholder="Digite seu nome"
				[control]="_formGroup.controls.name"
			></app-input>
			<app-input
				id="email-address-reg"
				label="E-mail"
				type="email"
				placeholder="Digite seu email..."
				[control]="_formGroup.controls.email"
			></app-input>
			<app-input
				id="login-password-reg"
				label="Senha"
				type="password"
				placeholder="Digite sua senha..."
				[control]="_formGroup.controls.password"
			></app-input>

			<button type="submit" class="w-full rounded h-11 bg-secondary hover:bg-hoverOrange font-bold text-slate-900 transition duration-150 mt-2">
				Cadastrar-se
			</button>

			<div class="text-sm text-center">
				<button
					type="button"
					(click)="register()"
					class="w-full rounded h-11 font-medium text-slate-800 hover:text-slate-900 transition duration-150"
				>
					Voltar para Login
				</button>
			</div>
		</form>
	}
</div>
