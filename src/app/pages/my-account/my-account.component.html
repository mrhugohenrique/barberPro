<app-window title="Minha conta">
	<div class="flex-auto px-4 lg:px-10 py-10 pt-0 mt-3">
		<div class="flex flex-wrap -mx-3 mb-6">
			<div class="w-full px-3">
				<app-input
					label="Nome"
					[id]="'grid-first-name'"
					placeholder="Seu nome"
					[control]="_formGroup.controls.name"
				></app-input>
			</div>
		</div>
		<div class="flex flex-wrap -mx-3 mb-6">
			<div class="w-full px-3">
				<app-input
					label="Email"
					[id]="'grid_Email'"
					placeholder="Email"
					[control]="_formGroup.controls.email"
				></app-input>
			</div>
		</div>
		<div class="flex flex-wrap -mx-3 mb-6">
			<div class="w-full md:w-1/2 px-3 mb-6 md:mb-0">
				<label
					class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2"
					for="first-password"
				>
					Nova senha
				</label>
				<input
					class="appearance-none block w-full bg-white text-gray-700 border rounded py-3 px-4 mb-3 leading-tight outline-none border-gray-500 transition focus:border-secondary focus:ring-1 focus:ring-secondary"
					id="first-password"
					type="password"
					[maxlength]="6"
					[minlength]="6"
					[formControl]="_formGroup.controls.password"
					autocomplete="new-password"
				/>
			</div>
			<div class="w-full md:w-1/2 px-3">
				<label
					class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2"
					for="last-password"
				>
					Confirmar nova senha
				</label>
				<input
					class="appearance-none block w-full bg-white text-gray-700 border rounded py-3 px-4 mb-3 leading-tight outline-none border-gray-500 transition focus:border-secondary focus:ring-1 focus:ring-secondary"
					id="last-password"
					type="password"
					[maxlength]="6"
					[minlength]="6"
					[formControl]="_formGroup.controls.newPassword"
					autocomplete="new-password"
				/>
			</div>
		</div>
		<div class="flex flex-wrap gap-1 mb-0">
			<button
				class="w-full px-3 mb-6 md:mb-0 rounded h-11 bg-secondary hover:bg-hoverOrange font-bold text-slate-900 transition duration-150"
				type="button"
				(click)="attRegister()"
			>
				Atualizar dados
			</button>
		</div>
	</div>
</app-window>
