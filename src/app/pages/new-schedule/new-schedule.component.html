<app-window title="Novo serviço">
	<div class="flex-auto px-4 lg:px-10 py-10 pt-0 mt-3">
		<div class="flex flex-wrap -mx-3 mb-6">
			<div class="w-full px-3">
				<app-input
					[id]="'grid-first-name'"
					[label]="'Digite o nome do cliente'"
					placeholder="Digite o nome do cliente"
					[control]="_formGroup.controls.name"
				></app-input>
			</div>
		</div>
		<div class="flex flex-wrap -mx-3 mb-6">
			<div class="w-full px-3">
				<app-select
					[id]="'haircut'"
					[label]="'Tipo de serviço'"
					[options]="haircuts()"
					[control]="_formGroup.controls.haircut"
				></app-select>
			</div>
		</div>
		<div class="flex flex-wrap gap-1 mb-0">
			<button
				class="w-full px-3 mb-6 md:mb-0 rounded h-11 bg-secondary hover:bg-hoverOrange font-bold text-slate-900 transition duration-150"
				type="button"
				(click)="handleRegisterService()"
			>
				Registrar
			</button>
		</div>
	</div>
</app-window>
